name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - website/**
      - website-api-dto/**
      - .github/workflows/deploy-website.yml

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  WEBSITE_BUCKET_NAME: beta.enfieldnhzoning.org
  CLOUDFRONT_DISTRIBUTION_ID: E1EDHDSGB5463B
  PUBLIC_API_BASE_URL: https://4j2sx26ytuhcdvxxmbvuvls75m0eoiub.lambda-url.us-east-1.on.aws/

jobs:
  deploy-website:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website-api-dto
        run: npm run build --workspace @enfield-zoning/website-api-dto

      - name: Build website
        env:
          PUBLIC_API_BASE_URL: ${{ env.PUBLIC_API_BASE_URL }}
        run: npm run build --workspace @enfield-zoning/website

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Sync website to S3
        run: |
          set -euo pipefail

          aws s3 sync website/dist "s3://$WEBSITE_BUCKET_NAME" \
            --delete
            
      - name: Invalidate CloudFront
        run: |
          set -euo pipefail

          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"