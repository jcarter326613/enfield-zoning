name: Deploy API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - aws-deployment/**
      - website-api/**
      - website-api-dto/**
      - .github/workflows/deploy-api.yml
      - .github/actions/prepare-api/action.yml

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: enfieldnhzoning/website-api
  DOMAIN: https://beta.enfieldnhzoning.org

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare API
        id: prepare-api
        uses: ./.github/actions/prepare-api
        env:
          DOMAIN: ${{ env.DOMAIN }}
          MAILTRAP_TOKEN: ${{ secrets.MAILTRAP_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker build \
            -f website-api/Dockerfile \
            -t "$IMAGE_URI" \
            "${{ steps.prepare-api.outputs.build-dir }}"

          docker push "$IMAGE_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy API
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd aws-deployment
          npm ci
          npx cdk deploy --require-approval never -c imageTag="$IMAGE_TAG"